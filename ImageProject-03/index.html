<!DOCTYPE html>
<html>
	<head>
		<script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
	</head>
	<body>
		<a-scene>
			<!-- Asset imports -->
			<a-assets>
          		<img id="skybox" src="images/skybox.jpg">

				<a-asset-item id="tree" src="models/Lowpoly_tree_sample.obj"></a-asset-item>
        	</a-assets>

			<!-- Sky -->
			<a-sky src="#skybox"></a-sky>

			<!-- Models -->
			<a-obj-model src="#tree" position="-9.081 0 -10" scale=".25 .25 .25" color="green"></a-obj-model>
			<a-obj-model src="#tree" position="-5 0 -20" scale=".5 .5 .5" material="shader:flat;src:#tex5"></a-obj-model>
			<a-entity 
				src="model-sofa"
				material="color: red"
				position="0 0 0"
				rotation="0 0 0"
				scale="1 1 1">
			</a-entity>
			
			<!-- Primitives -->
			<a-box
				position="-1 0.5 -3"
				rotation="0 45 0"
				color="#4CC3D9">
			</a-box>
			<a-sphere
				position="0 1.25 -5"
				radius="1.25"
				color="#EF2D5E">
			</a-sphere>
			<a-cylinder
				position="1 0.75 -3"
				radius="0.5"
				height="1.5"
				color="#FFC65D">
			</a-cylinder>
			<a-plane
				position="0 0 -4"
				rotation="-90 0 0"
				width="20"
				height="20"
				color="#7BC8A4">
			</a-plane>
		</a-scene>
	</body>
</html>
