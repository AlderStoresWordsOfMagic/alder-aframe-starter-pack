<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-scene>
        <a-assets>
          <img id="sky" src="sky.jpg">
          <img id="orang" src="orang.jpg">
          <img id="clone" src="clone.png">
        </a-assets>
        <a-sky src="#sky"></a-sky>
      </a-scene>

      <a-sphere 
        position="3 1 -7" 
        radius="1"
        material="src: #clone; repeat:1 1; transparent: false; opacity: 1"
        color="#5E2DEF">
      </a-sphere>
      <a-plane 
        position="0 0 -4" 
        rotation="-90 0 0" 
        width="12" 
        height="12" 
        material="src: #orang; repeat:1 1; transparent: false; opacity: 1"
        color="#7BC8A4">
      </a-plane>

      <a-box 
        position="-2.25 1 -3" 
        rotation="0 30 10" 
        width="0.0625" 
        depth="0.0625" 
        height="2"
        material="src: #clone; repeat:1 1; transparent: false; opacity: 1"
        color="#4CC3D9">
      </a-box>
      <a-cone 
        position="-2.375 2 -2.875" 
        rotation="0 30 10" 
        width="0.0625" 
        height="0.25" 
        material="src: #clone; repeat:1 1; transparent: false; opacity: 1"
        color="#4CC3D9">
      </a-cone>


    </a-scene>
  </body>
</html>
